frr version 10.4.1
frr defaults traditional
hostname r2
log syslog informational
!
interface Ethernet0
 ipv6 address 2001:db8:12::2/64
!
interface Ethernet4
 ipv6 address 2001:db8:25::2/64
!
interface Loopback0
 ip address 10.0.0.2/32
 ipv6 address 2001:db8:2::1/128
!
ipv6 forwarding
ip forwarding
!
router bgp 65002
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 no bgp ebgp-requires-policy
 !
 neighbor 2001:db8:12::1 remote-as 65001
 neighbor 2001:db8:12::1 description r1
 !
 neighbor 2001:db8:25::5 remote-as 65005
 neighbor 2001:db8:25::5 description rn
 !
 address-family ipv6 unicast
  network 2001:db8:2::1/128
  network fc00:0:2::/48
  neighbor 2001:db8:12::1 activate
  neighbor 2001:db8:12::1 next-hop-self
  neighbor 2001:db8:12::1 soft-reconfiguration inbound
  neighbor 2001:db8:25::5 activate
  neighbor 2001:db8:25::5 next-hop-self
  neighbor 2001:db8:25::5 soft-reconfiguration inbound
  exit-address-family
!
exit
!
end